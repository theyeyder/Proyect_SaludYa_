name: SaludYa CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias Frontend
        run: npm install

      - name: Build Frontend
        run: npm run build

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias Backend
        run: npm install

      - name: Ejecutar pruebas Jest
        run: npm test